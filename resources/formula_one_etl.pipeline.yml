# The main pipeline for formula_one

resources:
  pipelines:
    formula_one_etl:
      name: formula_one_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/formula_one_etl"

      libraries:
        - file:
            path: "../src/formula_one_etl/transformations/bronze/*.py"


      environment:
        dependencies:
          - --editable
          -
  clusters:
    default_f4_single_node:
      spark_version: 16.4.x-scala2.12
      cluster_name: "Formula One F4 Cluster"
      node_type_id: "Standard_F4"
      num_workers: 0
      spark_conf:
        "spark.databricks.cluster.profile": "singleNode"
        "spark.master": "local[*]"
      custom_tags:
        "ResourceClass": "SingleNode"