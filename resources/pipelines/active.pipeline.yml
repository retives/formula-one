# This pipeline runs actively during the race
resources:
  pipelines:
    formula_one_active_etl:
      name: formula_one_active_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../../src/formula_one_etl"

      libraries:
        - file:
            path: "../../src/formula_one_etl/transformations/bronze/active_data.py"
        - file:
            path: "../../src/formula_one_etl/transformations/silver/silver_data.py"
        - file:
            path: "../../src/formula_one_etl/transformations/gold/gold.py"

      clusters:
        - label: "default"
          node_type_id: "Standard_F4"
          num_workers: 0
          spark_conf:
            "spark.databricks.cluster.profile": "singleNode"
            "spark.master": "local[*]"
          custom_tags:
            "ResourceClass": "SingleNode"
