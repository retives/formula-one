
resources:
  pipelines:
    download_data:
      name: download_data
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../../src/formula_one_etl"

      libraries:
        - file:
            path: "../../src/formula_one_etl/transformations/bronze/load_data.py"
      clusters:
        - label: "default"
          node_type_id: "Standard_F4"
          num_workers: 0
          spark_conf:
            "spark.databricks.cluster.profile": "singleNode"
            "spark.master": "local[*]"
          custom_tags:
            "ResourceClass": "SingleNode"