name: Databricks Bundle Deployment

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --- DEV DEPLOYMENT (Triggered on PRs to Main) ---
  deploy-dev:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: DEV
    env:
      DATABRICKS_HOST: ${{ secrets.DEV_DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DEV_DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DEV_DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      
      - name: Validate and Deploy to DEV
        run: |
          databricks bundle validate -t dev
          databricks bundle deploy -t dev

  # --- TEST DEPLOYMENT (Triggered on Merge to Main) ---
  deploy-test:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: TEST
    env:
      DATABRICKS_HOST: ${{ secrets.TEST_DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.TEST_DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.TEST_DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      
      - name: Validate and Deploy to TEST
        run: |
          databricks bundle validate -t test
          databricks bundle deploy -t test
